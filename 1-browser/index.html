<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoAquarium — Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070714; overflow: hidden; font-family: monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
    #ui { position: fixed; top: 20px; left: 20px; pointer-events: none; }
    #title { font-size: 10px; letter-spacing: 3px; opacity: 0.3; text-transform: uppercase; }
    #current-node {
      margin-top: 6px; font-size: 20px; font-weight: bold;
      color: #4fc3f7; text-shadow: 0 0 20px #4fc3f7aa; min-height: 26px;
    }
    #path-line { margin-top: 3px; font-size: 10px; opacity: 0.45; color: #aaa; }
    #badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .badge {
      padding: 2px 9px; border-radius: 10px; font-size: 9px; letter-spacing: 1.5px;
      transition: all 0.3s;
    }
    .badge-normal  { background: rgba(79,195,247,.14); color:#4fc3f7; border:1px solid #4fc3f744; }
    .badge-hyper   { background: rgba(171,71,188,.2);  color:#ce93d8; border:1px solid #ab47bc88; text-shadow:0 0 8px #ab47bcaa; }
    .badge-game    { background: rgba(255,213,79,.18); color:#ffd54f; border:1px solid #ffd54f66; }
    .badge-voronoi { background: rgba(128,203,196,.15); color:#80cbc4; border:1px solid #80cbc466; }
    .badge-cross   { background: rgba(255,138,101,.15); color:#ff8a65; border:1px solid #ff8a6566; }
    .badge-edit    { background: rgba(255,213,79,.22);  color:#ffd54f; border:1px solid #ffd54faa; text-shadow:0 0 8px #ffd54faa; }
    .badge-q6      { background: rgba(128,203,196,.15); color:#80cbc4; border:1px solid #80cbc466; }
    /* InfoM panel */
    #infom-panel {
      position: fixed; top: 20px; right: 20px;
      font-family: monospace; font-size: 10px; z-index: 20;
    }
    #infom-badge {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px; border-radius: 20px; cursor: pointer;
      background: rgba(7,7,20,0.85); border: 1px solid #33445544;
      user-select: none; transition: border-color 0.2s;
    }
    #infom-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: #445; }
    #infom-expand {
      display: none; margin-top: 8px; padding: 14px;
      background: rgba(7,7,20,0.97); border: 1px solid rgba(79,195,247,0.15);
      border-radius: 10px; width: 240px; box-shadow: 0 4px 30px rgba(0,0,0,.7);
    }
    #infom-expand input, #infom-expand textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(79,195,247,0.2); border-radius: 6px;
      color: #ccc; font-family: monospace; font-size: 11px;
      padding: 5px 8px; outline: none; box-sizing: border-box;
    }
    #infom-expand textarea { resize: none; }
    .infom-btn {
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      background: rgba(79,195,247,0.15); border: 1px solid #4fc3f744;
      color: #4fc3f7; font-family: monospace; font-size: 10px;
    }
    #infom-stats { margin-top:8px; font-size:10px; line-height:2; color:#667; }
    #infom-stats span { color:#4fc3f7; float:right; }
    /* Query panel */
    #query-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(7,7,20,0.78); backdrop-filter: blur(6px);
      z-index: 50; align-items: center; justify-content: center;
    }
    #query-overlay.open { display: flex; }
    #query-box {
      width: 600px; max-width: 92vw;
      background: rgba(10,10,28,0.98);
      border: 1px solid rgba(79,195,247,0.25); border-radius: 16px;
      padding: 20px; font-family: monospace;
      box-shadow: 0 0 60px rgba(79,195,247,.12);
    }
    #query-input {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(79,195,247,0.2); border-radius: 8px;
      color: #e8e8ff; font-family: monospace; font-size: 14px;
      padding: 10px 14px; outline: none; box-sizing: border-box; resize: none;
    }
    #query-answer {
      margin-top: 12px; padding: 12px;
      background: rgba(255,255,255,0.02); border-radius: 8px;
      font-size: 13px; line-height: 1.7; color: #ccd;
      max-height: 240px; overflow-y: auto; white-space: pre-wrap;
      display: none;
    }
    #query-archetype {
      font-size: 10px; margin-bottom: 8px; padding: 5px 10px;
      border-radius: 6px; display: inline-block;
    }
    /* Score panel */
    #score-panel {
      position: fixed; top: 20px; right: 20px;
      font-size: 11px; text-align: right; pointer-events: none;
      line-height: 2;
    }
    #score-panel .score-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; margin-bottom: 2px; }
    #score-panel .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Game choice overlay */
    #choices {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; pointer-events: all;
    }
    .choice-btn {
      background: rgba(7,7,20,0.88); border: 1px solid #4fc3f766;
      color: #4fc3f7; font-family: monospace; font-size: 12px;
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      transition: all 0.15s;
    }
    .choice-btn:hover { background: rgba(79,195,247,.2); border-color: #4fc3f7bb; }
    .choice-btn .key { opacity: 0.5; font-size: 9px; margin-right: 4px; }
    #hint {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; opacity: 0.22; letter-spacing: 1px; pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="title">InfoAquarium v0.3</div>
  <div id="current-node"></div>
  <div id="path-line"></div>
  <div id="badges">
    <span id="badge-mode" class="badge badge-normal">NORMAL</span>
    <span id="badge-game"    class="badge badge-game"    style="display:none">GAME</span>
    <span id="badge-voronoi" class="badge badge-voronoi" style="display:none">VORONOI</span>
    <span id="badge-cross"   class="badge badge-cross"   style="display:none">CROSSWORD</span>
    <span id="badge-edit"    class="badge badge-edit"    style="display:none">EDIT</span>
    <span id="badge-q6"      class="badge badge-q6"      style="display:none">Q6</span>
  </div>
</div>

<div id="score-panel"></div>
<div id="choices"></div>
<div id="hint">H гиперб. · G игра · V ворон. · Q Q6 · C кросс. · E ред. · / запрос · Скролл зум</div>

<!-- InfoM connection panel -->
<div id="infom-panel">
  <div id="infom-badge" onclick="toggleInfoMExpand()">
    <div class="dot" id="infom-dot"></div>
    <span id="infom-label" style="letter-spacing:1px">INFOM</span>
    <span id="infom-counts" style="opacity:.5; color:#aaa"></span>
    <span id="infom-caret" style="opacity:.3">▼</span>
  </div>
  <div id="infom-expand">
    <div style="font-size:9px;opacity:.4;letter-spacing:1px;margin-bottom:5px">URL СЕРВЕРА</div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input id="infom-url" value="http://localhost:8000" placeholder="http://localhost:8000" />
      <button class="infom-btn" onclick="infomConnect()">→</button>
    </div>
    <div id="infom-stats"></div>
    <div style="margin-top:10px;font-size:9px;opacity:.4;letter-spacing:1px;margin-bottom:5px">ИНДЕКСИРОВАТЬ ТЕКСТ</div>
    <textarea id="infom-index-text" rows="3" placeholder="Вставь текст для индексации..."></textarea>
    <button class="infom-btn" style="margin-top:5px;width:100%" onclick="infomIndexText()">↑ ИНДЕКСИРОВАТЬ</button>
    <div id="infom-index-msg" style="font-size:9px;color:#80cbc4;margin-top:5px;opacity:.7"></div>
  </div>
</div>

<!-- Query overlay -->
<div id="query-overlay" onclick="queryOverlayClick(event)">
  <div id="query-box">
    <div style="font-size:9px;opacity:.4;letter-spacing:2px;margin-bottom:10px">INFOM GRAPHRAG QUERY · Escape закрыть</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="infom-btn" id="qm-hybrid" onclick="setQueryMode('hybrid')">HYBRID</button>
      <button class="infom-btn" id="qm-local"  onclick="setQueryMode('local')">LOCAL</button>
      <button class="infom-btn" id="qm-global" onclick="setQueryMode('global')">GLOBAL</button>
    </div>
    <textarea id="query-input" rows="2" placeholder="Задай вопрос графу знаний... (Enter — отправить)" onkeydown="queryKeyDown(event)"></textarea>
    <div id="query-answer">
      <div id="query-archetype"></div>
      <div id="query-text"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/delaunator@5.0.1/delaunator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6/dist/d3-delaunay.umd.min.js"></script>
<script>
'use strict';
// ─── DATA ────────────────────────────────────────────────────────────────────
const NODES = [
  // level 2 — strategies
  { id:0,  label:'Время',         cat:0, level:2 },
  { id:1,  label:'Пространство',  cat:1, level:2 },
  { id:2,  label:'Движение',      cat:1, level:1 },
  { id:3,  label:'Память',        cat:2, level:1 },
  { id:4,  label:'Смысл',         cat:2, level:2 },
  { id:5,  label:'Форма',         cat:3, level:2 },
  { id:6,  label:'Связь',         cat:3, level:1 },
  { id:7,  label:'Поиск',         cat:0, level:1 },
  { id:8,  label:'Знание',        cat:2, level:1 },
  { id:9,  label:'Вопрос',        cat:0, level:1 },
  { id:10, label:'Граница',       cat:3, level:1 },
  { id:11, label:'Путь',          cat:1, level:1 },
  // level 3 — archetypes (cluster attractors)
  { id:12, label:'Бытие',         cat:0, level:3 },
  { id:13, label:'Поток',         cat:1, level:3 },
  { id:14, label:'Познание',      cat:2, level:3 },
  { id:15, label:'Структура',     cat:3, level:3 },
];
const EDGES = [
  // original graph
  [0,1],[0,2],[0,3],[0,7],[0,9],
  [1,2],[1,5],[1,10],[1,11],
  [2,4],[2,6],[2,11],
  [3,4],[3,8],[3,9],
  [4,5],[4,7],[4,8],
  [5,6],[5,10],
  [6,7],[6,8],[6,11],
  [7,9],[8,9],[9,10],[10,11],[3,11],[0,8],
  // archetype → cluster
  [12,0],[12,7],[12,9],
  [13,1],[13,2],[13,11],
  [14,4],[14,3],[14,8],
  [15,5],[15,6],[15,10],
  // archetype ring
  [12,13],[13,14],[14,15],[15,12],
];
const CAT_HUE = [300, 200, 140, 30];
// level → base node radius
function nodeLevel(i){ return NODES[i]?.level ?? 1; }
function levelNodeR(i){ const lv=nodeLevel(i); return lv===3?30:lv===2?18:12; }
const adj = Array.from({length:NODES.length}, ()=>[]);
EDGES.forEach(([a,b])=>{ adj[a].push(b); adj[b].push(a); });

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const state = NODES.map((_,i)=>{
  const a=(i/NODES.length)*Math.PI*2;
  return { x:Math.cos(a)*200, y:Math.sin(a)*200, vx:0, vy:0 };
});
function physicsStep(){
  const n=state.length;
  for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
    const dx=state[j].x-state[i].x, dy=state[j].y-state[i].y;
    const d2=dx*dx+dy*dy+1, d=Math.sqrt(d2), f=4500/d2;
    const fx=f*dx/d, fy=f*dy/d;
    state[i].vx-=fx; state[i].vy-=fy; state[j].vx+=fx; state[j].vy+=fy;
  }
  EDGES.forEach(([a,b])=>{
    const dx=state[b].x-state[a].x, dy=state[b].y-state[a].y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    // archetype edges use shorter rest length (cluster tighter)
    const rest = (nodeLevel(a)===3||nodeLevel(b)===3) ? 110 : 160;
    const s=(d-rest)*0.04;
    const fx=s*dx/d, fy=s*dy/d;
    state[a].vx+=fx; state[a].vy+=fy; state[b].vx-=fx; state[b].vy-=fy;
  });
  // Cluster force: each archetype gently pulls same-cat nodes toward it
  NODES.forEach((n,i)=>{
    if(n.level!==3) return;
    NODES.forEach((m,j)=>{
      if(m.cat!==n.cat || i===j) return;
      const dx=state[i].x-state[j].x, dy=state[i].y-state[j].y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const target = m.level===2 ? 120 : 190;
      const s=(d-target)*0.012;
      const fx=s*dx/d, fy=s*dy/d;
      state[j].vx+=fx; state[j].vy+=fy;
      state[i].vx-=fx*0.08; state[i].vy-=fy*0.08;
    });
  });
  for(let i=0;i<n;i++){
    state[i].vx=(state[i].vx-state[i].x*0.003)*0.88;
    state[i].vy=(state[i].vy-state[i].y*0.003)*0.88;
    state[i].x+=state[i].vx; state[i].y+=state[i].vy;
  }
}

// ─── BFS ─────────────────────────────────────────────────────────────────────
function bfsPath(start, end){
  if(start===end) return [start];
  const vis=new Set([start]), q=[[start,[start]]];
  while(q.length){
    const [cur,p]=q.shift();
    for(const nb of adj[cur]){
      if(nb===end) return [...p,nb];
      if(!vis.has(nb)){vis.add(nb);q.push([nb,[...p,nb]]);}
    }
  }
  return [start];
}

// ─── AGENTS ──────────────────────────────────────────────────────────────────
// Agent 0 is the player (in game mode), others are auto-bots
const AGENT_DEFS = [
  { color:'#4fc3f7', name:'Ты',      speed:0.009 },
  { color:'#ff6b9d', name:'Αlpha',   speed:0.007 },
  { color:'#c792ea', name:'Βeta',    speed:0.008 },
  { color:'#80cbc4', name:'Γamma',   speed:0.006 },
  { color:'#ffd54f', name:'Δelta',   speed:0.010 },
];

const DETAIL_COUNT = 12; // non-archetype nodes for initial agent spawn
const agents = AGENT_DEFS.map((def,i)=>({
  ...def,
  from: (i*3) % DETAIL_COUNT,
  to:   adj[(i*3)%DETAIL_COUNT][0],
  t:    Math.random(),
  trail:[],
  pheromones: new Float32Array(EDGES.length).fill(0.03),
  plannedPath:[],
  score: 0,
  waitingForChoice: false,   // only for player agent in game mode
}));

// ─── PHEROMONES ───────────────────────────────────────────────────────────────
function evaporate(){
  agents.forEach(ag=>{
    for(let i=0;i<ag.pheromones.length;i++)
      ag.pheromones[i]=Math.max(0.02, ag.pheromones[i]*0.997);
  });
}
function deposit(ag, from, to){
  const idx=EDGES.findIndex(([a,b])=>(a===from&&b===to)||(a===to&&b===from));
  if(idx>=0) ag.pheromones[idx]=Math.min(1, ag.pheromones[idx]+0.28);
}

// ─── GAME MODE ───────────────────────────────────────────────────────────────
let gameMode   = false;
let gameTarget = null;    // index of current target node
let choicesDiv = document.getElementById('choices');
let totalFrames = 0;

function newTarget(){
  let t;
  do { t = Math.floor(Math.random()*NODES.length); }
  while(t===agents[0].from);
  gameTarget = t;
}

function renderChoices(){
  choicesDiv.innerHTML = '';
  if(!gameMode || !agents[0].waitingForChoice) return;
  const options = adj[agents[0].from];
  options.forEach((ni,k)=>{
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="key">${k+1}</span>${NODES[ni].label}`;
    btn.onclick = ()=>{ playerChoose(ni); };
    choicesDiv.appendChild(btn);
  });
}

function playerChoose(nodeIdx){
  const ag = agents[0];
  if(!ag.waitingForChoice) return;
  ag.to = nodeIdx;
  ag.t  = 0;
  ag.waitingForChoice = false;
  choicesDiv.innerHTML = '';
}

// ─── HYPER MODE ──────────────────────────────────────────────────────────────
let hyperMode  = false;
let hyperFocus = 0;
const cam = { x:0, y:0, scale:1 };

function mobius(px,py,ax,ay){
  const nr=px-ax, ni=py-ay;
  const dr=1-(ax*px+ay*py), di=-(ax*py-ay*px);
  const d2=dr*dr+di*di+1e-12;
  return { x:(nr*dr+ni*di)/d2, y:(ni*dr-nr*di)/d2 };
}
function diskR(){ return Math.min(W,H)*0.44*cam.scale; }
function projectToDisk(){
  const maxR=Math.max(...state.map(s=>Math.hypot(s.x,s.y)))||1;
  const sc=0.93/maxR;
  const norm=state.map(s=>({x:s.x*sc, y:s.y*sc}));
  const fa=norm[hyperFocus];
  return norm.map(p=>mobius(p.x,p.y,fa.x,fa.y));
}
function hyperNodeR(hx,hy){ return Math.max(5,22*(1-Math.hypot(hx,hy)*0.75)); }
function d2s(hx,hy){ const r=diskR(); return {x:W/2+hx*r, y:H/2+hy*r}; }

// ─── VORONOI MODE ────────────────────────────────────────────────────────────
let voronoiMode = false;

function drawVoronoi(positions){
  if(!window.d3?.Delaunay) return;
  const pts = positions.map(p=>[p.x,p.y]);
  const del  = d3.Delaunay.from(pts);
  // bounding box: generous world-space rectangle
  const xs=positions.map(p=>p.x), ys=positions.map(p=>p.y);
  const pad=200;
  const voro = del.voronoi([
    Math.min(...xs)-pad, Math.min(...ys)-pad,
    Math.max(...xs)+pad, Math.max(...ys)+pad
  ]);
  NODES.forEach((n,i)=>{
    const hue   = CAT_HUE[n.cat];
    const pulse = 0.08 + 0.025*Math.sin(frame*0.015+i*0.8);
    const path  = new Path2D(voro.renderCell(i));
    ctx.fillStyle   = `hsla(${hue},58%,26%,${pulse})`;
    ctx.strokeStyle = `hsla(${hue},65%,55%,0.3)`;
    ctx.lineWidth   = 1.5;
    ctx.fill(path);
    ctx.stroke(path);
  });
}

// ─── CROSSWORD MODE ──────────────────────────────────────────────────────────
let crosswordMode = false;

const CROSS_WORDS = EDGES.map(([a,b])=>{
  const pool=['и','в','из','к','от','по','за','при','над','нет','как','да','же','ли','бы'];
  return pool[(a*7+b*3)%pool.length];
});

function drawCrossword(positions){
  const BOX=11, GAP=1;
  EDGES.forEach(([a,b],ei)=>{
    const pa=positions[a], pb=positions[b];
    const word=CROSS_WORDS[ei];
    const dx=pb.x-pa.x, dy=pb.y-pa.y;
    const angle=Math.atan2(dy,dx);
    const ph=combinedPheromone(ei);
    const hue=200-ph*160;
    const totalW=word.length*(BOX+GAP);

    ctx.save();
    ctx.translate((pa.x+pb.x)/2,(pa.y+pb.y)/2);
    ctx.rotate(angle);

    word.split('').forEach((ch,k)=>{
      const x=-totalW/2+k*(BOX+GAP);
      ctx.fillStyle=`hsla(${hue},40%,11%,0.85)`;
      ctx.strokeStyle=`hsla(${hue},70%,55%,${0.3+ph*0.55})`;
      ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.rect(x,-BOX/2,BOX,BOX); ctx.fill(); ctx.stroke();
      ctx.fillStyle=`hsla(${hue},70%,82%,${0.5+ph*0.45})`;
      ctx.font=`bold ${BOX-2}px monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(ch.toUpperCase(), x+BOX/2, 0);
    });
    ctx.restore();
  });
}

// ─── NODE EDITOR ─────────────────────────────────────────────────────────────
let editMode      = false;
let editSelected  = null;   // node index selected as edge source
let editMouseWorld= {x:0,y:0};
let nodeIdCounter = 16;

function editorAddNode(wx,wy){
  const id=nodeIdCounter++;
  NODES.push({id, label:`Узел${id}`, cat:id%4});
  state.push({x:wx,y:wy,vx:0,vy:0});
  adj.push([]);
  CROSS_WORDS.length=EDGES.length; // keep in sync
  agents.forEach(ag=>{
    const np=new Float32Array(EDGES.length).fill(0.03);
    np.set(ag.pheromones.slice(0,EDGES.length)); ag.pheromones=np;
  });
}

function editorAddEdge(a,b){
  if(a===b) return;
  if(EDGES.some(([x,y])=>(x===a&&y===b)||(x===b&&y===a))) return;
  EDGES.push([a,b]);
  adj[a].push(b); adj[b].push(a);
  const word=['и','в','из','к','от','по'][(a*7+b*3)%6];
  CROSS_WORDS.push(word);
  agents.forEach(ag=>{
    const np=new Float32Array(EDGES.length).fill(0.03);
    np.set(ag.pheromones); ag.pheromones=np;
  });
}

function editorRemoveNode(idx){
  for(let i=EDGES.length-1;i>=0;i--){
    if(EDGES[i][0]===idx||EDGES[i][1]===idx){ EDGES.splice(i,1); CROSS_WORDS.splice(i,1); }
  }
  NODES.splice(idx,1); state.splice(idx,1); adj.splice(idx,1);
  adj.forEach(list=>{
    for(let k=list.length-1;k>=0;k--){
      if(list[k]===idx) list.splice(k,1); else if(list[k]>idx) list[k]--;
    }
  });
  EDGES.forEach(e=>{ if(e[0]>idx)e[0]--; if(e[1]>idx)e[1]--; });
  NODES.forEach((n,i)=>{n.id=i;});
  agents.forEach(ag=>{
    if(ag.from>=NODES.length) ag.from=0;
    if(ag.to>=NODES.length||!adj[ag.from].includes(ag.to)) ag.to=adj[ag.from]?.[0]??0;
    ag.pheromones=new Float32Array(EDGES.length).fill(0.03);
  });
  if(editSelected===idx||editSelected>=NODES.length) editSelected=null;
}

function drawEditOverlay(positions){
  // orange border while in edit mode
  ctx.save();
  ctx.strokeStyle='rgba(255,200,80,0.12)'; ctx.lineWidth=6;
  ctx.strokeRect(0,0,W,H);
  ctx.restore();

  if(editSelected===null) return;
  const from=positions[editSelected];
  // pending edge dashed line to mouse
  ctx.save();
  ctx.setLineDash([7,4]);
  ctx.strokeStyle='rgba(255,210,80,0.65)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(from.x,from.y); ctx.lineTo(editMouseWorld.x,editMouseWorld.y); ctx.stroke();
  ctx.restore();
  // glow ring around selected node
  ctx.save();
  ctx.shadowColor='#ffd54f'; ctx.shadowBlur=20;
  ctx.strokeStyle='#ffd54f'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(from.x,from.y,26+3*Math.sin(frame*0.1),0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
let isDragging=false, dragStart={x:0,y:0}, camStart={x:0,y:0};

function toWorld(sx,sy){ return {x:(sx-W/2)/cam.scale-cam.x, y:(sy-H/2)/cam.scale-cam.y}; }

function hitTest(sx,sy){
  if(hyperMode){
    const R=diskR(), disk=projectToDisk();
    const hx=(sx-W/2)/R, hy=(sy-H/2)/R;
    let best=null, bestD=0.12;
    disk.forEach((p,i)=>{const d=Math.hypot(p.x-hx,p.y-hy); if(d<bestD){bestD=d;best=i;}});
    return best;
  }
  const w=toWorld(sx,sy); let best=null, bestD=20/cam.scale+5;
  state.forEach((s,i)=>{const d=Math.hypot(s.x-w.x,s.y-w.y); if(d<bestD){bestD=d;best=i;}});
  return best;
}

canvas.addEventListener('mousedown', e=>{
  const hit=hitTest(e.clientX,e.clientY);

  if(editMode){
    if(hit!==null){
      if(editSelected===null){
        editSelected=hit; // first click: select source node
      } else if(editSelected!==hit){
        editorAddEdge(editSelected,hit); // second click: add edge
        editSelected=null;
      } else {
        editSelected=null; // click same node: deselect
      }
    } else {
      // click empty space: add new node
      const w=toWorld(e.clientX,e.clientY);
      editorAddNode(w.x,w.y);
      editSelected=null;
    }
    return;
  }

  if(hit!==null){
    if(gameMode){
      if(adj[agents[0].from].includes(hit)&&agents[0].waitingForChoice) playerChoose(hit);
    } else {
      agents[0].plannedPath=bfsPath(agents[0].from,hit);
      hyperFocus=hit;
    }
    document.getElementById('current-node').textContent=NODES[hit].label;
  } else if(!hyperMode){
    isDragging=true; dragStart={x:e.clientX,y:e.clientY}; camStart={x:cam.x,y:cam.y};
  }
});
canvas.addEventListener('contextmenu', e=>{
  e.preventDefault();
  if(!editMode) return;
  const hit=hitTest(e.clientX,e.clientY);
  if(hit!==null) editorRemoveNode(hit);
});
canvas.addEventListener('mousemove', e=>{
  if(editMode){
    editMouseWorld = hyperMode
      ? (() => { const R=diskR(); return {x:(e.clientX-W/2)/R*200, y:(e.clientY-H/2)/R*200}; })()
      : toWorld(e.clientX,e.clientY);
  }
  if(!isDragging) return;
  cam.x=camStart.x+(e.clientX-dragStart.x)/cam.scale;
  cam.y=camStart.y+(e.clientY-dragStart.y)/cam.scale;
});
canvas.addEventListener('mouseup',()=>{ isDragging=false; });
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  cam.scale=Math.max(0.2,Math.min(5,cam.scale*(e.deltaY<0?1.1:0.9)));
},{passive:false});

window.addEventListener('keydown', e=>{
  if(e.key==='h'||e.key==='H'){
    hyperMode=!hyperMode;
    const mb=document.getElementById('badge-mode');
    mb.textContent=hyperMode?'HYPER · POINCARÉ':'NORMAL';
    mb.className='badge '+(hyperMode?'badge-hyper':'badge-normal');
  }
  if(e.key==='g'||e.key==='G'){

    document.getElementById('badge-game').style.display=gameMode?'inline-block':'none';
    if(gameMode){ newTarget(); agents[0].waitingForChoice=false; }
    else { choicesDiv.innerHTML=''; gameTarget=null; }
  }
  if(e.key==='v'||e.key==='V'){
    voronoiMode=!voronoiMode;
    document.getElementById('badge-voronoi').style.display=voronoiMode?'inline-block':'none';
  }
  if(e.key==='c'||e.key==='C'){
    crosswordMode=!crosswordMode;
    document.getElementById('badge-cross').style.display=crosswordMode?'inline-block':'none';
  }
  if(e.key==='e'||e.key==='E'){

  }
  if(e.key==='q'||e.key==='Q'){

  }

  if(e.key==='Escape'){ editSelected=null; closeQuery(); activeArchId=null; }
  // digit keys for choice
  const k=parseInt(e.key);
  if(gameMode && agents[0].waitingForChoice && !isNaN(k) && k>=1){
    const options=adj[agents[0].from];
    if(k<=options.length) playerChoose(options[k-1]);
  }
});

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }

// category → base MIDI note (C pentatonic)
const CAT_NOTES = [261.63, 329.63, 392.00, 523.25]; // C4 E4 G4 C5

function playNote(cat, volume=0.18, dur=0.22){
  ensureAudio();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type      = 'sine';
  osc.frequency.value = CAT_NOTES[cat] * (0.98 + Math.random()*0.04);
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  osc.start(); osc.stop(audioCtx.currentTime+dur);
}

function playArrival(cat){ playNote(cat, 0.22, 0.3); }
function playScore()     {
  ensureAudio();
  [523.25, 659.25, 783.99].forEach((f,i)=>{
    const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type='triangle'; osc.frequency.value=f;
    g.gain.setValueAtTime(0.15, audioCtx.currentTime+i*0.1);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+i*0.1+0.4);
    osc.start(audioCtx.currentTime+i*0.1); osc.stop(audioCtx.currentTime+i*0.1+0.4);
  });
}

// ─── AGENT STEP ──────────────────────────────────────────────────────────────
function stepAgents(){
  agents.forEach((ag,ai)=>{
    const isPlayer = ai===0 && gameMode;

    // player waiting for choice — don't move
    if(isPlayer && ag.waitingForChoice) return;

    ag.t += ag.speed;
    if(ag.t >= 1){
      deposit(ag, ag.from, ag.to);
      ag.t    = 0;
      ag.from = ag.to;

      if(ai===0) hyperFocus=ag.from;

      // play arrival note
      playArrival(NODES[ag.from].cat);

      // game mode: check if player reached target
      if(isPlayer && gameTarget===ag.from){
        ag.score++;
        playScore();
        newTarget();
      }

      if(isPlayer){
        // pause and show choices
        ag.waitingForChoice=true;
        renderChoices();
        return;
      }

      // bot: follow planned path or choose by pheromone bias
      if(ag.plannedPath.length>1 && ag.plannedPath[0]===ag.from){
        ag.plannedPath.shift(); ag.to=ag.plannedPath[0];
      } else {
        const options=adj[ag.from];
        // ACO choice: pheromone + random
        const scores=options.map(nb=>{
          const idx=EDGES.findIndex(([a,b])=>(a===ag.from&&b===nb)||(a===nb&&b===ag.from));
          return Math.pow(ag.pheromones[idx]??0.03, 2) + 0.1;
        });
        const total=scores.reduce((s,x)=>s+x,0);
        let r=Math.random()*total, chosen=options[0];
        for(let k=0;k<options.length;k++){ r-=scores[k]; if(r<=0){chosen=options[k];break;} }
        ag.to=chosen;
      }
    }

    const a=state[ag.from], b=state[ag.to];
    const x=a.x+(b.x-a.x)*ag.t, y=a.y+(b.y-a.y)*ag.t;
    ag.trail.push({x,y});
    if(ag.trail.length>35) ag.trail.shift();
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let frame=0;

// Combined pheromone heatmap across all agents
function combinedPheromone(ei){
  return Math.min(1, agents.reduce((s,ag)=>s+ag.pheromones[ei],0));
}

function edgeStyle(ei){
  const ph=combinedPheromone(ei);
  return { hue:200-ph*180, alpha:0.18+ph*0.65, width:0.8+ph*4, blur:4+ph*14 };
}

function triangleHue(a,b,c){
  return ((NODES[a].cat+NODES[b].cat+NODES[c].cat)/3/3)*280+30;
}

function drawTerrain(positions){
  const coords=positions.flatMap(p=>[p.x,p.y]);
  const del=new Delaunator(coords), tris=del.triangles;
  for(let i=0;i<tris.length;i+=3){
    const a=positions[tris[i]], b=positions[tris[i+1]], c=positions[tris[i+2]];
    if(!a||!b||!c) continue;
    const hue=triangleHue(tris[i],tris[i+1],tris[i+2]);
    const pulse=0.11+0.04*Math.sin(frame*0.02+i*0.3);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.closePath();
    ctx.fillStyle=`hsla(${hue},70%,33%,${pulse})`;
    ctx.strokeStyle=`hsla(${hue},60%,70%,0.07)`; ctx.lineWidth=0.5;
    ctx.fill(); ctx.stroke();
  }
}

function drawEdges(positions){
  EDGES.forEach(([a,b],ei)=>{
    const pa=positions[a], pb=positions[b];
    const {hue,alpha,width,blur}=edgeStyle(ei);
    ctx.save();
    ctx.shadowColor=`hsl(${hue},85%,65%)`; ctx.shadowBlur=blur;
    ctx.strokeStyle=`hsla(${hue},75%,65%,${alpha})`; ctx.lineWidth=width;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    ctx.restore();
  });
}

function drawNodes(positions, nodeR){
  NODES.forEach((n,i)=>{
    const pos=positions[i];
    if(!pos) return;
    const isTarget  = gameMode && gameTarget===i;
    const isArchetype = n.level===3;
    // base radius from level or hyper callback
    const baseR = nodeR ? nodeR(i, pos) : levelNodeR(i);
    const r = isArchetype ? baseR*(1+0.06*Math.sin(frame*0.04+i)) : baseR;
    const hue=CAT_HUE[n.cat];

    // outer glow
    const glowR=r*(isTarget?3.5:isArchetype?2.8:1.6);
    const grd=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,glowR);
    grd.addColorStop(0,`hsla(${hue},75%,60%,${isArchetype?0.5:isTarget?0.7:0.30})`);
    grd.addColorStop(1,`hsla(${hue},60%,40%,0)`);
    ctx.beginPath(); ctx.arc(pos.x,pos.y,glowR,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();

    ctx.save();
    ctx.shadowColor=`hsl(${hue},80%,70%)`; ctx.shadowBlur=isArchetype?30:isTarget?28:10;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${hue},${isArchetype?80:70}%,${isArchetype?38:40}%,0.92)`; ctx.fill();

    // archetype: double pulsing ring
    if(isArchetype){
      const ring1=r+5+3*Math.sin(frame*0.05+i);
      const ring2=r+12+5*Math.sin(frame*0.03+i*1.3);
      ctx.strokeStyle=`hsla(${hue},90%,75%,0.65)`; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,ring1,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle=`hsla(${hue},70%,60%,0.25)`; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(pos.x,pos.y,ring2,0,Math.PI*2); ctx.stroke();
    }
    if(isTarget){
      const pr=r+4+3*Math.sin(frame*0.1);
      ctx.beginPath(); ctx.arc(pos.x,pos.y,pr,0,Math.PI*2);
      ctx.strokeStyle=`hsl(${hue},90%,80%)`; ctx.lineWidth=2; ctx.stroke();
    }
    ctx.restore();

    // label: archetypes always visible + larger; others fade in
    const fontSize = isArchetype
      ? Math.max(13, r*0.6)|0
      : (nodeR ? Math.max(7,r*0.7)|0 : 11);
    if(isArchetype || r>7){
      const alpha = isArchetype ? 1 : Math.min(1,r/14);
      ctx.fillStyle=`hsla(${hue},${isArchetype?90:60}%,${isArchetype?95:88}%,${alpha})`;
      ctx.font=`${isArchetype?'bold ':''}${fontSize}px monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.label, pos.x, pos.y+r+fontSize+2);
    }
  });
}

function drawAgent(ag, positions, nodeR){
  // trail
  ag.trail.forEach((pt,i)=>{
    const al=(i/ag.trail.length)*0.6;
    const sz=(i/ag.trail.length)*3.5;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,sz,0,Math.PI*2);
    ctx.fillStyle=ag.color+(Math.round(al*255).toString(16).padStart(2,'0'));
    ctx.fill();
  });

  // body
  const pa=positions[ag.from], pb=positions[ag.to];
  if(!pa||!pb) return;
  const tx=pa.x+(pb.x-pa.x)*ag.t, ty=pa.y+(pb.y-pa.y)*ag.t;
  const pr=5+2*Math.sin(frame*0.15+ag.from);

  ctx.save();
  ctx.shadowColor=ag.color; ctx.shadowBlur=20;
  const grd=ctx.createRadialGradient(tx,ty,0,tx,ty,pr);
  grd.addColorStop(0,'rgba(255,255,255,1)');
  grd.addColorStop(0.3,ag.color+'ee');
  grd.addColorStop(1,ag.color+'00');
  ctx.beginPath(); ctx.arc(tx,ty,pr,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
  ctx.restore();
}

function drawNormal(){
  // grid
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.025)'; ctx.lineWidth=1;
  const step=80*cam.scale;
  const ox=((cam.x*cam.scale+W/2)%step+step)%step;
  const oy=((cam.y*cam.scale+H/2)%step+step)%step;
  for(let x=ox;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  ctx.save();
  ctx.translate(W/2,H/2); ctx.scale(cam.scale,cam.scale); ctx.translate(cam.x,cam.y);
  if(voronoiMode) drawVoronoi(state);
  else            drawTerrain(state);
  if(crosswordMode) drawCrossword(state);
  else              drawEdges(state);
  agents.forEach(ag=>drawAgent(ag,state,null));
  drawNodes(state, levelNodeR);
  if(editMode) drawEditOverlay(state);
  ctx.restore();
  drawQ6Grid();
}

function drawHyper(){
  const R=diskR(), disk=projectToDisk();
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,R);
  bg.addColorStop(0,'rgba(14,10,40,0.9)'); bg.addColorStop(0.7,'rgba(8,6,25,0.95)'); bg.addColorStop(1,'rgba(2,2,8,1)');
  ctx.beginPath(); ctx.arc(W/2,H/2,R,0,Math.PI*2); ctx.fillStyle=bg; ctx.fill();
  ctx.save(); ctx.shadowColor='#ab47bc'; ctx.shadowBlur=20;
  ctx.strokeStyle='rgba(171,71,188,0.4)'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();

  ctx.save(); ctx.beginPath(); ctx.arc(W/2,H/2,R-1,0,Math.PI*2); ctx.clip();

  const screen=disk.map(p=>d2s(p.x,p.y));
  if(voronoiMode) drawVoronoi(screen);
  else            drawTerrain(screen);
  if(crosswordMode) drawCrossword(screen);
  else              drawEdges(screen);

  // agent trails projected
  const maxR=Math.max(...state.map(s=>Math.hypot(s.x,s.y)))||1, sc=0.93/maxR;
  const fa={x:state[hyperFocus].x*sc, y:state[hyperFocus].y*sc};

  agents.forEach(ag=>{
    const projTrail=ag.trail.map(pt=>{
      const mp=mobius(pt.x*sc,pt.y*sc,fa.x,fa.y);
      return d2s(mp.x,mp.y);
    });
    // draw projected trail
    projTrail.forEach((pt,i)=>{
      const al=(i/projTrail.length)*0.6, sz=(i/projTrail.length)*3.5;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,sz,0,Math.PI*2);
      ctx.fillStyle=ag.color+(Math.round(al*255).toString(16).padStart(2,'0'));
      ctx.fill();
    });
  });

  const norm=state.map(s=>({x:s.x*sc,y:s.y*sc}));
  agents.forEach(ag=>{
    const pa=norm[ag.from], pb=norm[ag.to];
    const ti={x:pa.x+(pb.x-pa.x)*ag.t, y:pa.y+(pb.y-pa.y)*ag.t};
    const tm=mobius(ti.x,ti.y,fa.x,fa.y), ts=d2s(tm.x,tm.y);
    const pr=5+2*Math.sin(frame*0.15);
    ctx.save(); ctx.shadowColor=ag.color; ctx.shadowBlur=18;
    const grd=ctx.createRadialGradient(ts.x,ts.y,0,ts.x,ts.y,pr);
    grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.4,ag.color+'dd'); grd.addColorStop(1,ag.color+'00');
    ctx.beginPath(); ctx.arc(ts.x,ts.y,pr,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    ctx.restore();
  });

  drawNodes(screen, (i,pos)=>hyperNodeR(disk[i].x,disk[i].y) * (levelNodeR(i)/12));
  if(editMode) drawEditOverlay(screen);
  ctx.restore();
  drawQ6Grid();
}

// ─── Q6 HEX GRID ─────────────────────────────────────────────────────────────
let q6Mode        = false;
let q6Communities = [];   // from infom /stats
let activeArchId  = null; // archetype name highlighted after query

const Q6_GROUPS = ['time','space','mind','form'];
const Q6_COLORS = [[255,107,157],[79,195,247],[199,146,234],[128,203,196]];
const Q6_ARCHS  = ['Бытие','Поток','Познание','Структура'];
const SHAPE_SYM = n => n>=9?'∿':({3:'△',4:'□',5:'⬠',6:'⬡',7:'☆',8:'✳'}[n]||'◆');

function hexToXY(q, r, sz){
  return { x: sz*Math.sqrt(3)*(q+r/2), y: sz*(3/2)*r };
}
function hexCorners6(cx,cy,sz){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/3*i+Math.PI/6;
    return [cx+sz*Math.cos(a),cy+sz*Math.sin(a)];
  });
}
function hexIdToAxial(id){ return {q:id%8-3.5, r:Math.floor(id/8)-3.5}; }
function parseHexId(s){
  if(!s) return null;
  const m=s.match(/(\d+)$/); if(m) return parseInt(m[1])%64;
  if(/^[01]+$/.test(s)) return parseInt(s,2)%64;
  return null;
}

function drawQ6Grid(){
  if(!q6Mode) return;
  const sz = Math.min(W,H)*0.038;
  const ox  = W/2 + cam.x*cam.scale;
  const oy  = H/2 + cam.y*cam.scale;
  ctx.save();
  // background hex grid (all 64 cells)
  for(let id=0;id<64;id++){
    const {q,r}=hexIdToAxial(id);
    const {x,y}=hexToXY(q,r,sz);
    const corners=hexCorners6(ox+x,oy+y,sz*0.91);
    ctx.beginPath(); ctx.moveTo(...corners[0]);
    corners.slice(1).forEach(c=>ctx.lineTo(...c)); ctx.closePath();
    ctx.strokeStyle='rgba(79,195,247,0.05)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  // colored communities
  const communities = q6Communities.length ? q6Communities :
    [{hex_id:'hex_18',n_nodes:6,label:'Бытие'},{hex_id:'hex_21',n_nodes:6,label:'Поток'},
     {hex_id:'hex_42',n_nodes:6,label:'Познание'},{hex_id:'hex_45',n_nodes:6,label:'Структура'}];

  communities.forEach((c,i)=>{
    const hexId=parseHexId(c.hex_id??`hex_${[18,21,42,45][i%4]}`);
    if(hexId===null) return;
    const {q,r}=hexIdToAxial(hexId);
    const {x,y}=hexToXY(q,r,sz);
    const px=ox+x, py=oy+y;
    const [cr,cg,cb]=Q6_COLORS[i%4];
    const isActive=activeArchId===Q6_ARCHS[i%4];
    const pulse=isActive?0.28+0.12*Math.sin(frame*0.06):0.08+0.03*Math.sin(frame*0.015+i);
    const corners=hexCorners6(px,py,sz*0.87);
    ctx.beginPath(); ctx.moveTo(...corners[0]);
    corners.slice(1).forEach(c2=>ctx.lineTo(...c2)); ctx.closePath();
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${pulse})`; ctx.fill();
    ctx.strokeStyle=isActive?`rgba(${cr},${cg},${cb},0.75)`:`rgba(${cr},${cg},${cb},0.28)`;
    ctx.lineWidth=isActive?2:0.8;
    if(isActive){ctx.save();ctx.shadowColor=`rgb(${cr},${cg},${cb})`;ctx.shadowBlur=16;}
    ctx.stroke();
    if(isActive) ctx.restore();
    // shape symbol + label
    const sym=SHAPE_SYM(c.n_nodes??6);
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${isActive?0.95:0.55})`;
    ctx.font=`${sz*0.5}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sym,px,py);
    ctx.font=`${Math.max(7,sz*0.26)}px monospace`;
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${isActive?0.85:0.35})`;
    ctx.fillText((c.label||Q6_ARCHS[i%4]).slice(0,8),px,py+sz*0.58);
  });
  // corner label
  ctx.fillStyle='rgba(79,195,247,0.18)'; ctx.font='8px monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('Q6 · 64 CELLS',12,12);
  ctx.restore();
}

// ─── INFOM API ────────────────────────────────────────────────────────────────
let infomStatus = 'disconnected';
let infomUrl    = 'http://localhost:8000';
let infomGraph  = null;

const ARCH_KEYWORDS = {
  Бытие:    ['время','история','дата','период','past','time','era','history'],
  Поток:    ['пространство','место','движение','путь','space','path','location'],
  Познание: ['знание','смысл','понимание','концепция','mind','concept','knowledge'],
  Структура:['форма','структура','граница','число','form','structure','network','graph'],
};
function detectArchetype(text){
  const t=text.toLowerCase();
  let best=null,bestN=0;
  for(const [a,kws] of Object.entries(ARCH_KEYWORDS)){
    const n=kws.reduce((s,k)=>s+(t.includes(k)?1:0),0);
    if(n>bestN){bestN=n;best=a;}
  }
  return best||'Познание';
}

function setInfoMStatus(s){
  infomStatus=s;
  const colors={disconnected:'#445',connecting:'#ffd54f',connected:'#80cbc4',error:'#ff6b6b'};
  const icons ={disconnected:'○',connecting:'◌',connected:'●',error:'✕'};
  const dot=document.getElementById('infom-dot');
  const lbl=document.getElementById('infom-label');
  if(dot){dot.style.background=colors[s]||'#445';}
  if(lbl){lbl.style.color=colors[s]||'#667';}
}

async function infomConnect(){
  infomUrl=document.getElementById('infom-url').value.trim()||'http://localhost:8000';
  setInfoMStatus('connecting');
  try{
    const r=await fetch(`${infomUrl}/`,{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    infomGraph=d.graph;
    setInfoMStatus('connected');
    const cnt=document.getElementById('infom-counts');
    if(cnt) cnt.textContent=`${d.graph.nodes}n · ${d.graph.communities}c`;
    renderInfoMStats(d.graph);
    // Fetch communities from stats
    try{
      const sr=await fetch(`${infomUrl}/stats`);
      const sd=await sr.json();
      q6Communities=parseInfoMStats(sd.result||'');
    }catch{}
  }catch(e){
    setInfoMStatus('error');
    console.warn('infom connect failed',e);
  }
}

function parseInfoMStats(text){
  const comms=[];
  text.split('\n').forEach(line=>{
    const m=line.match(/\[([^\]]+)\]\s+(.+?)\s+\(Q6=(\S+),\s*nodes=(\d+)\)/);
    if(m) comms.push({shape:m[1].trim(),label:m[2].trim(),hex_id:m[3],n_nodes:parseInt(m[4])});
  });
  return comms;
}

function renderInfoMStats(g){
  const el=document.getElementById('infom-stats');
  if(!el||!g) return;
  el.innerHTML=`<div>Узлов <span>${g.nodes}</span></div>
    <div>Рёбер <span>${g.edges}</span></div>
    <div>Сообществ <span>${g.communities}</span></div>
    <div>Modularity Q <span>${(g.modularity||0).toFixed(3)}</span></div>`;
}

async function infomIndexText(){
  const text=document.getElementById('infom-index-text').value.trim();
  if(!text||infomStatus!=='connected') return;
  const msg=document.getElementById('infom-index-msg');
  if(msg) msg.textContent='◌ индексирую...';
  try{
    await fetch(`${infomUrl}/index`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text,reset:false}),
    });
    await fetch(`${infomUrl}/build`,{method:'POST'});
    const r=await fetch(`${infomUrl}/`);
    const d=await r.json();
    infomGraph=d.graph;
    renderInfoMStats(d.graph);
    document.getElementById('infom-index-text').value='';
    if(msg) msg.textContent=`Готово. Узлов: ${d.graph.nodes}`;
  }catch(e){
    if(msg) msg.textContent=`Ошибка: ${e.message}`;
  }
}

function toggleInfoMExpand(){
  const el=document.getElementById('infom-expand');
  const caret=document.getElementById('infom-caret');
  if(!el) return;
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(caret) caret.textContent=open?'▼':'▲';
}

// ─── QUERY PANEL ─────────────────────────────────────────────────────────────
let queryMode='hybrid';
let queryOpen=false;
let queryTypeTimer=null;

function openQuery(){
  queryOpen=true;
  const ov=document.getElementById('query-overlay');
  if(ov){ov.classList.add('open');document.getElementById('query-input').focus();}
}
function closeQuery(){
  queryOpen=false;
  const ov=document.getElementById('query-overlay');
  if(ov) ov.classList.remove('open');
}
function queryOverlayClick(e){
  if(e.target.id==='query-overlay') closeQuery();
}
function setQueryMode(m){
  queryMode=m;
  ['hybrid','local','global'].forEach(name=>{
    const btn=document.getElementById(`qm-${name}`);
    if(btn) btn.style.background=name===m?'rgba(79,195,247,0.3)':'rgba(79,195,247,0.15)';
  });
}
function queryKeyDown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitQuery();}
}
async function submitQuery(){
  if(infomStatus!=='connected'){
    showQueryAnswer('Сначала подключись к infom (кнопка INFOM справа вверху).','#ff6b6b',null);
    return;
  }
  const text=document.getElementById('query-input').value.trim();
  if(!text) return;
  showQueryAnswer('◌ запрос...','#4fc3f7',null);
  try{
    const r=await fetch(`${infomUrl}/query`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:text,mode:queryMode}),
    });
    const d=await r.json();
    const answer=d.result||'';
    const arch=detectArchetype(text+' '+answer);
    showQueryAnswer(answer,'#ccd',arch);
    // Navigate agent to archetype node
    navigateToArchetype(arch);
  }catch(e){
    showQueryAnswer(`Ошибка: ${e.message}`,'#ff6b6b',null);
  }
}
function showQueryAnswer(text,color,arch){
  const ansEl=document.getElementById('query-answer');
  const textEl=document.getElementById('query-text');
  const archEl=document.getElementById('query-archetype');
  if(!ansEl||!textEl||!archEl) return;
  ansEl.style.display='block';
  textEl.style.color=color;
  // Archetype badge
  const archColors={Бытие:'#ff6b9d',Поток:'#4fc3f7',Познание:'#c792ea',Структура:'#80cbc4'};
  if(arch){
    archEl.style.display='inline-block';
    archEl.style.background=`${archColors[arch]||'#4fc3f7'}18`;
    archEl.style.border=`1px solid ${archColors[arch]||'#4fc3f7'}44`;
    archEl.style.color=archColors[arch]||'#4fc3f7';
    archEl.textContent=`● АРХЕТИП: ${arch}`;
    activeArchId=arch;
  } else {
    archEl.style.display='none';
  }
  // Typewriter
  clearInterval(queryTypeTimer);
  let i=0; textEl.textContent='';
  queryTypeTimer=setInterval(()=>{
    if(i>=text.length){clearInterval(queryTypeTimer);return;}
    textEl.textContent=text.slice(0,++i);
  },10);
}
function navigateToArchetype(archName){
  const nodeIdx=NODES.findIndex(n=>n.label===archName);
  if(nodeIdx<0) return;
  agents[0].plannedPath=bfsPath(agents[0].from,nodeIdx);
  hyperFocus=nodeIdx;
  document.getElementById('current-node').textContent=NODES[nodeIdx].label;
}

// ─── MAIN DRAW ───────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(hyperMode) drawHyper();
  else          drawNormal();
  renderScorePanel();
  updateStatus();
  frame++;
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
function loop(){
  physicsStep();
  evaporate();
  stepAgents();
  draw();
  requestAnimationFrame(loop);
}

// Init first choices if game starts immediately
loop();
