<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoAquarium — Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070714; overflow: hidden; font-family: monospace; color: #fff; }
    canvas { display: block; cursor: crosshair; }
    #ui { position: fixed; top: 20px; left: 20px; pointer-events: none; }
    #title { font-size: 11px; letter-spacing: 3px; opacity: 0.35; text-transform: uppercase; }
    #current-node {
      margin-top: 8px; font-size: 20px; font-weight: bold;
      color: #4fc3f7; text-shadow: 0 0 20px #4fc3f7aa; min-height: 28px;
    }
    #current-edge { margin-top: 4px; font-size: 11px; opacity: 0.5; color: #aaa; }
    #mode-badge {
      margin-top: 10px; display: inline-block;
      padding: 3px 10px; border-radius: 12px; font-size: 10px; letter-spacing: 2px;
      transition: all 0.3s;
    }
    #mode-badge.normal { background: rgba(79,195,247,0.15); color: #4fc3f7; border: 1px solid #4fc3f755; }
    #mode-badge.hyper  { background: rgba(171,71,188,0.2);  color: #ce93d8; border: 1px solid #ab47bc88;
                         text-shadow: 0 0 10px #ab47bcaa; }
    #legend {
      position: fixed; top: 20px; right: 20px;
      font-size: 10px; opacity: 0.35; text-align: right;
      pointer-events: none; line-height: 2;
    }
    #hint {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px; opacity: 0.25; letter-spacing: 1px;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">InfoAquarium v0.2</div>
  <div id="current-node"></div>
  <div id="current-edge"></div>
  <div id="mode-badge" class="normal">NORMAL</div>
</div>
<div id="legend">
  H — переключить режим<br>
  Клик на узел — цель<br>
  Перетащить — панорама<br>
  Колесо — зум
</div>
<div id="hint">Информационный аквариум · H = гиперболический режим</div>

<script src="https://unpkg.com/delaunator@5.0.1/delaunator.min.js"></script>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const NODES = [
  { id: 0, label: 'Время',         category: 0 },
  { id: 1, label: 'Пространство',  category: 1 },
  { id: 2, label: 'Движение',      category: 1 },
  { id: 3, label: 'Память',        category: 2 },
  { id: 4, label: 'Смысл',         category: 2 },
  { id: 5, label: 'Форма',         category: 3 },
  { id: 6, label: 'Связь',         category: 3 },
  { id: 7, label: 'Поиск',         category: 0 },
  { id: 8, label: 'Знание',        category: 2 },
  { id: 9, label: 'Вопрос',        category: 0 },
  { id:10, label: 'Граница',       category: 3 },
  { id:11, label: 'Путь',          category: 1 },
];

const EDGES = [
  [0,1],[0,2],[0,3],[0,7],[0,9],
  [1,2],[1,5],[1,10],[1,11],
  [2,4],[2,6],[2,11],
  [3,4],[3,8],[3,9],
  [4,5],[4,7],[4,8],
  [5,6],[5,10],
  [6,7],[6,8],[6,11],
  [7,9],[8,9],[9,10],[10,11],[3,11],[0,8],
];

const CAT_COLORS = [
  [300, 70, 30],
  [200, 80, 28],
  [140, 70, 25],
  [30,  80, 28],
];

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// ─── CAMERA (normal mode) ────────────────────────────────────────────────────
const cam = { x: 0, y: 0, scale: 1 };
let diskR = () => Math.min(W, H) * 0.44; // hyper mode disk radius

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const REPULSION = 4500, SPRING_K = 0.04, SPRING_LEN = 160, DAMPING = 0.88, CENTER_PULL = 0.003;

const state = NODES.map((n, i) => {
  const a = (i / NODES.length) * Math.PI * 2;
  return { x: Math.cos(a) * 200, y: Math.sin(a) * 200, vx: 0, vy: 0 };
});

const adj = Array.from({ length: NODES.length }, () => []);
EDGES.forEach(([a, b]) => { adj[a].push(b); adj[b].push(a); });

function physicsStep() {
  const n = state.length;
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const dx = state[j].x - state[i].x, dy = state[j].y - state[i].y;
      const d2 = dx*dx + dy*dy + 1, d = Math.sqrt(d2);
      const f  = REPULSION / d2;
      const fx = f*dx/d, fy = f*dy/d;
      state[i].vx -= fx; state[i].vy -= fy;
      state[j].vx += fx; state[j].vy += fy;
    }
  }
  EDGES.forEach(([a, b]) => {
    const dx = state[b].x - state[a].x, dy = state[b].y - state[a].y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 1;
    const s  = (d - SPRING_LEN) * SPRING_K;
    const fx = s*dx/d, fy = s*dy/d;
    state[a].vx += fx; state[a].vy += fy;
    state[b].vx -= fx; state[b].vy -= fy;
  });
  for (let i = 0; i < n; i++) {
    state[i].vx = (state[i].vx - state[i].x * CENTER_PULL) * DAMPING;
    state[i].vy = (state[i].vy - state[i].y * CENTER_PULL) * DAMPING;
    state[i].x += state[i].vx;
    state[i].y += state[i].vy;
  }
}

// ─── PHEROMONES (ACO) ────────────────────────────────────────────────────────
const pheromones  = new Float32Array(EDGES.length).fill(0.05);
const EVAP        = 0.997;   // per frame evaporation factor
const DEPOSIT     = 0.30;    // added when traveler crosses edge
const PHERO_MIN   = 0.02;

function evaporatePheromones() {
  for (let i = 0; i < pheromones.length; i++) {
    pheromones[i] = Math.max(PHERO_MIN, pheromones[i] * EVAP);
  }
}

function depositPheromone(from, to) {
  const idx = EDGES.findIndex(([a, b]) => (a===from&&b===to)||(a===to&&b===from));
  if (idx >= 0) pheromones[idx] = Math.min(1, pheromones[idx] + DEPOSIT);
}

// ─── HYPERBOLIC (Poincaré disk) ──────────────────────────────────────────────
let hyperMode  = false;
let hyperFocus = 0;   // index of node at center of disk

// Möbius transform: move point `a` to origin of unit disk
// T_a(z) = (z - a) / (1 - conj(a)·z)
function mobius(px, py, ax, ay) {
  const nr = px - ax, ni = py - ay;
  const dr = 1 - (ax*px + ay*py);
  const di = -(ax*py - ay*px);
  const d2 = dr*dr + di*di + 1e-12;
  return { x: (nr*dr + ni*di)/d2, y: (ni*dr - nr*di)/d2 };
}

// Project all node positions into unit disk (normalized) + apply Möbius focus
function projectToDisk() {
  // Step 1: normalize to unit disk
  const maxR = Math.max(...state.map(s => Math.hypot(s.x, s.y))) || 1;
  const scale = 0.93 / maxR;
  const norm = state.map(s => ({ x: s.x * scale, y: s.y * scale }));

  // Step 2: Möbius transform — move focus node to center
  const fa = norm[hyperFocus];
  return norm.map(p => mobius(p.x, p.y, fa.x, fa.y));
}

// Disk coordinate to screen
function d2s(hx, hy) {
  const r = diskR();
  return { x: W/2 + hx*r, y: H/2 + hy*r };
}

// Node display radius in hyper mode (larger at center, smaller at edge)
function hyperNodeR(hx, hy) {
  const r = Math.hypot(hx, hy);
  return Math.max(5, 22 * (1 - r * 0.75));
}

// ─── DELAUNAY ────────────────────────────────────────────────────────────────
function triangleHue(a, b, c) {
  return ((NODES[a].category + NODES[b].category + NODES[c].category) / 3 / 3) * 280 + 30;
}

// ─── TRAVELER ────────────────────────────────────────────────────────────────
const traveler = { from: 0, to: adj[0][0], t: 0, trail: [] };
let plannedPath = [];

function bfsPath(start, end) {
  if (start === end) return [start];
  const visited = new Set([start]);
  const queue   = [[start, [start]]];
  while (queue.length) {
    const [cur, path] = queue.shift();
    for (const nb of adj[cur]) {
      if (nb === end) return [...path, nb];
      if (!visited.has(nb)) { visited.add(nb); queue.push([nb, [...path, nb]]); }
    }
  }
  return [start];
}

function stepTraveler() {
  traveler.t += 0.008;
  if (traveler.t >= 1) {
    depositPheromone(traveler.from, traveler.to);
    traveler.t    = 0;
    traveler.from = traveler.to;
    hyperFocus    = traveler.from; // hyper disk follows traveler

    if (plannedPath.length > 1 && plannedPath[0] === traveler.from) {
      plannedPath.shift();
      traveler.to = plannedPath[0];
    } else {
      traveler.to = adj[traveler.from][Math.floor(Math.random() * adj[traveler.from].length)];
    }
  }

  const a = state[traveler.from], b = state[traveler.to];
  const tx = a.x + (b.x - a.x) * traveler.t;
  const ty = a.y + (b.y - a.y) * traveler.t;
  traveler.trail.push({ x: tx, y: ty });
  if (traveler.trail.length > 45) traveler.trail.shift();
}

// ─── INTERACTION ─────────────────────────────────────────────────────────────
let isDragging = false, dragStart = {x:0,y:0}, camStart = {x:0,y:0};

function toWorld(sx, sy) {
  return { x: (sx - W/2)/cam.scale - cam.x, y: (sy - H/2)/cam.scale - cam.y };
}

function hitTestNormal(sx, sy) {
  const w = toWorld(sx, sy);
  let best = null, bestD = (18 / cam.scale) + 6;
  state.forEach((s, i) => {
    const d = Math.hypot(s.x - w.x, s.y - w.y);
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

function hitTestHyper(sx, sy) {
  const disk = projectToDisk();
  const r    = diskR();
  // convert screen click to unit-disk coords
  const hx = (sx - W/2) / r, hy = (sy - H/2) / r;
  let best = null, bestD = 0.12;
  disk.forEach((p, i) => {
    const d = Math.hypot(p.x - hx, p.y - hy);
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

canvas.addEventListener('mousedown', e => {
  const hit = hyperMode ? hitTestHyper(e.clientX, e.clientY)
                        : hitTestNormal(e.clientX, e.clientY);
  if (hit !== null) {
    plannedPath = bfsPath(traveler.from, hit);
    hyperFocus  = hit;
    document.getElementById('current-node').textContent = NODES[hit].label;
    document.getElementById('current-edge').textContent =
      '→ ' + plannedPath.map(i => NODES[i].label).join(' → ');
  } else if (!hyperMode) {
    isDragging = true;
    dragStart  = { x: e.clientX, y: e.clientY };
    camStart   = { x: cam.x, y: cam.y };
  }
});
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  cam.x = camStart.x + (e.clientX - dragStart.x) / cam.scale;
  cam.y = camStart.y + (e.clientY - dragStart.y) / cam.scale;
});
canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  if (hyperMode) {
    // zoom = scale the disk conceptually via cam.scale (reused for disk size multiplier)
    cam.scale = Math.max(0.4, Math.min(3, cam.scale * f));
  } else {
    cam.scale = Math.max(0.2, Math.min(5, cam.scale * f));
  }
}, { passive: false });

const modeBadge = document.getElementById('mode-badge');
window.addEventListener('keydown', e => {
  if (e.key === 'h' || e.key === 'H') {
    hyperMode = !hyperMode;
    modeBadge.textContent = hyperMode ? 'HYPER · POINCARÉ' : 'NORMAL';
    modeBadge.className   = hyperMode ? 'hyper' : 'normal';
  }
});

// ─── RENDER ──────────────────────────────────────────────────────────────────
let frame = 0;

// draw background grid for normal mode
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const step = 80 * cam.scale;
  const ox   = ((cam.x * cam.scale + W/2) % step + step) % step;
  const oy   = ((cam.y * cam.scale + H/2) % step + step) % step;
  for (let x = ox; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = oy; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

// edge color/width driven by pheromone level
function edgeStyle(ei) {
  const ph = pheromones[ei];
  // hot trail: cyan→orange→white as pheromone increases
  const hue    = 200 - ph * 180; // 200(cyan) → 20(orange)
  const alpha  = 0.18 + ph * 0.7;
  const width  = 0.8 + ph * 4;
  return { hue, alpha, width };
}

function drawNormal() {
  drawGrid();
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(cam.scale, cam.scale);
  ctx.translate(cam.x, cam.y);

  // Terrain
  const coords = state.flatMap(s => [s.x, s.y]);
  const del    = new Delaunator(coords);
  const tris   = del.triangles;
  for (let i = 0; i < tris.length; i += 3) {
    const a = tris[i], b = tris[i+1], c = tris[i+2];
    const sa = state[a], sb = state[b], sc = state[c];
    const pulse = 0.12 + 0.04 * Math.sin(frame * 0.02 + i * 0.3);
    const hue   = triangleHue(a, b, c);
    ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y); ctx.lineTo(sc.x,sc.y); ctx.closePath();
    ctx.fillStyle   = `hsla(${hue},70%,35%,${pulse})`;
    ctx.strokeStyle = `hsla(${hue},60%,70%,0.07)`;
    ctx.lineWidth = 0.5;
    ctx.fill(); ctx.stroke();
  }

  // Edges with pheromone heat
  EDGES.forEach(([a, b], ei) => {
    const sa = state[a], sb = state[b];
    const { hue, alpha, width } = edgeStyle(ei);
    ctx.save();
    ctx.shadowColor = `hsl(${hue},85%,65%)`;
    ctx.shadowBlur  = 4 + pheromones[ei] * 14;
    ctx.strokeStyle = `hsla(${hue},75%,65%,${alpha})`;
    ctx.lineWidth   = width;
    ctx.beginPath(); ctx.moveTo(sa.x,sa.y); ctx.lineTo(sb.x,sb.y); ctx.stroke();
    ctx.restore();
  });

  // Trail
  traveler.trail.forEach((pt, i) => {
    const a = (i / traveler.trail.length) * 0.7;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, (i / traveler.trail.length)*4, 0, Math.PI*2);
    ctx.fillStyle = `rgba(100,220,255,${a})`; ctx.fill();
  });

  // Nodes
  state.forEach((s, i) => {
    const [h, sat, l] = CAT_COLORS[NODES[i].category];
    const isTarget  = plannedPath.length > 0 && plannedPath[plannedPath.length-1] === i;
    const isCurrent = traveler.from === i;
    const r = 18;
    const glowR = isTarget ? r*2.5 : isCurrent ? r*2 : r*1.4;
    const grd = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,glowR);
    grd.addColorStop(0, `hsla(${h},${sat}%,${l+30}%,0.5)`);
    grd.addColorStop(1, `hsla(${h},${sat}%,${l}%,0)`);
    ctx.beginPath(); ctx.arc(s.x,s.y,glowR,0,Math.PI*2); ctx.fillStyle = grd; ctx.fill();

    ctx.save();
    ctx.shadowColor = `hsl(${h},${sat}%,70%)`; ctx.shadowBlur = isTarget ? 25 : 12;
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle = `hsla(${h},${sat}%,${l+15}%,0.85)`;
    ctx.fill();
    if (isTarget) { ctx.strokeStyle = `hsl(${h},90%,80%)`; ctx.lineWidth=2; ctx.stroke(); }
    ctx.restore();

    ctx.fillStyle = `hsla(${h},60%,85%,0.9)`;
    ctx.font      = `${isCurrent ? 'bold ' : ''}11px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(NODES[i].label, s.x, s.y + r + 12);
  });

  // Traveler
  const pa = state[traveler.from], pb = state[traveler.to];
  const tx = pa.x + (pb.x-pa.x)*traveler.t, ty = pa.y + (pb.y-pa.y)*traveler.t;
  const pr = 5 + 2*Math.sin(frame*0.15);
  ctx.save();
  ctx.shadowColor = '#4fc3f7'; ctx.shadowBlur = 20;
  const grd2 = ctx.createRadialGradient(tx,ty,0,tx,ty,pr);
  grd2.addColorStop(0,'rgba(255,255,255,1)');
  grd2.addColorStop(0.4,'rgba(100,220,255,0.9)');
  grd2.addColorStop(1,'rgba(50,100,255,0)');
  ctx.beginPath(); ctx.arc(tx,ty,pr,0,Math.PI*2); ctx.fillStyle=grd2; ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawHyper() {
  const R    = diskR() * cam.scale;
  const disk = projectToDisk();

  // ── Disk boundary ──
  // Background gradient (depth cue — fades to black at edge)
  const bgGrd = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,R);
  bgGrd.addColorStop(0,   'rgba(14,10,40,0.9)');
  bgGrd.addColorStop(0.7, 'rgba(8,6,25,0.95)');
  bgGrd.addColorStop(1,   'rgba(2,2,8,1)');
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2,H/2,R,0,Math.PI*2);
  ctx.fillStyle = bgGrd; ctx.fill();
  // rim glow
  ctx.strokeStyle = 'rgba(171,71,188,0.4)';
  ctx.lineWidth   = 2; ctx.shadowColor='#ab47bc'; ctx.shadowBlur=20;
  ctx.stroke();
  ctx.restore();

  // Clip to disk
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2,H/2,R-1,0,Math.PI*2); ctx.clip();

  // ── Terrain triangles (in disk space) ──
  const coords = disk.flatMap(p => [p.x, p.y]);
  try {
    const del  = new Delaunator(coords);
    const tris = del.triangles;
    for (let i = 0; i < tris.length; i += 3) {
      const a = tris[i], b = tris[i+1], c = tris[i+2];
      const pa = d2s(disk[a].x,disk[a].y), pb = d2s(disk[b].x,disk[b].y), pc = d2s(disk[c].x,disk[c].y);
      const pulse = 0.1 + 0.035*Math.sin(frame*0.02 + i*0.3);
      const hue   = triangleHue(a,b,c);
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.lineTo(pc.x,pc.y); ctx.closePath();
      ctx.fillStyle   = `hsla(${hue},65%,30%,${pulse})`;
      ctx.strokeStyle = `hsla(${hue},55%,65%,0.07)`;
      ctx.lineWidth   = 0.5; ctx.fill(); ctx.stroke();
    }
  } catch { /* skip degenerate */ }

  // ── Edges ──
  EDGES.forEach(([a, b], ei) => {
    const pa = d2s(disk[a].x,disk[a].y), pb = d2s(disk[b].x,disk[b].y);
    const { hue, alpha, width } = edgeStyle(ei);
    ctx.save();
    ctx.shadowColor = `hsl(${hue},85%,65%)`; ctx.shadowBlur = 4 + pheromones[ei]*14;
    ctx.strokeStyle = `hsla(${hue},75%,65%,${alpha})`;
    ctx.lineWidth   = width;
    ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
    ctx.restore();
  });

  // ── Trail (project each trail point) ──
  // approximate by projecting current traveler position
  const maxR2  = Math.max(...state.map(s => Math.hypot(s.x, s.y))) || 1;
  const scale2 = 0.93 / maxR2;
  const fa     = { x: state[hyperFocus].x*scale2, y: state[hyperFocus].y*scale2 };
  traveler.trail.forEach((pt, i) => {
    const np  = { x: pt.x*scale2, y: pt.y*scale2 };
    const mp  = mobius(np.x, np.y, fa.x, fa.y);
    const sp  = d2s(mp.x, mp.y);
    const al  = (i / traveler.trail.length) * 0.65;
    const sz  = (i / traveler.trail.length) * 3.5;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sz, 0, Math.PI*2);
    ctx.fillStyle = `rgba(100,220,255,${al})`; ctx.fill();
  });

  // ── Nodes ──
  disk.forEach((p, i) => {
    const [h, sat, l] = CAT_COLORS[NODES[i].category];
    const isTarget  = plannedPath.length > 0 && plannedPath[plannedPath.length-1] === i;
    const isCurrent = traveler.from === i;
    const isFocus   = hyperFocus === i;
    const sp        = d2s(p.x, p.y);
    const nr        = hyperNodeR(p.x, p.y);

    // outer glow
    const glowR = nr * (isTarget ? 2.8 : isFocus ? 2.5 : 1.8);
    const grd   = ctx.createRadialGradient(sp.x,sp.y,0,sp.x,sp.y,glowR);
    grd.addColorStop(0, `hsla(${h},${sat}%,${l+30}%,${isFocus?0.7:0.4})`);
    grd.addColorStop(1, `hsla(${h},${sat}%,${l}%,0)`);
    ctx.beginPath(); ctx.arc(sp.x,sp.y,glowR,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();

    ctx.save();
    ctx.shadowColor = `hsl(${h},${sat}%,70%)`; ctx.shadowBlur = isFocus ? 30 : 12;
    ctx.beginPath(); ctx.arc(sp.x,sp.y,nr,0,Math.PI*2);
    ctx.fillStyle = `hsla(${h},${sat}%,${l+15}%,${0.7+nr/30})`;
    ctx.fill();
    if (isTarget || isFocus) {
      ctx.strokeStyle = `hsl(${h},90%,85%)`; ctx.lineWidth = isFocus ? 2.5 : 1.5; ctx.stroke();
    }
    ctx.restore();

    // label — only show if node is large enough (not too far from center)
    if (nr > 9) {
      ctx.fillStyle = `hsla(${h},60%,90%,${Math.min(1, nr/18)})`;
      ctx.font      = `${isFocus || isCurrent ? 'bold ' : ''}${Math.max(8, nr*0.65)|0}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(NODES[i].label, sp.x, sp.y + nr + 10);
    }
  });

  // ── Traveler ──
  const norm2   = state.map(s => ({ x: s.x*scale2, y: s.y*scale2 }));
  const fa2     = norm2[hyperFocus];
  const ta      = norm2[traveler.from], tb = norm2[traveler.to];
  const tInterp = { x: ta.x+(tb.x-ta.x)*traveler.t, y: ta.y+(tb.y-ta.y)*traveler.t };
  const tMob    = mobius(tInterp.x, tInterp.y, fa2.x, fa2.y);
  const tSp     = d2s(tMob.x, tMob.y);
  const pr      = 5 + 2*Math.sin(frame*0.15);

  ctx.save();
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 22;
  const grd3 = ctx.createRadialGradient(tSp.x,tSp.y,0,tSp.x,tSp.y,pr);
  grd3.addColorStop(0,'rgba(255,255,255,1)');
  grd3.addColorStop(0.4,'rgba(100,220,255,0.9)');
  grd3.addColorStop(1,'rgba(50,100,255,0)');
  ctx.beginPath(); ctx.arc(tSp.x,tSp.y,pr,0,Math.PI*2); ctx.fillStyle=grd3; ctx.fill();
  ctx.restore();

  ctx.restore(); // end clip
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (hyperMode) drawHyper();
  else           drawNormal();

  // status label
  if (traveler.t < 0.05) {
    document.getElementById('current-node').textContent = NODES[traveler.from].label;
    if (plannedPath.length <= 1)
      document.getElementById('current-edge').textContent = '⟶ ' + NODES[traveler.to].label;
  }
  frame++;
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
function loop() {
  physicsStep();
  evaporatePheromones();
  stepTraveler();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
